name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-shared:
    name: Build Shared Package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'yarn'
    - name: Install and Build Shared
      run: |
        cd packages/shared
        yarn install --frozen-lockfile
        npx tsc --build --force

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'yarn'
    - name: Install and Build Web
      run: |
        cd packages/web
        yarn install --frozen-lockfile
        yarn build

  build-backend:
    name: Build Backend
    needs: build-shared
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'yarn'
    - name: Build Shared Package
      run: |
        cd packages/shared
        yarn install --frozen-lockfile
        npx tsc --build --force
    - name: Build Backend
      run: |
        cd backend
        yarn install --frozen-lockfile
        yarn build

  build-desktop:
    name: Build Desktop
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'yarn'
    - name: Build Desktop
      run: |
        cd packages/desktop
        yarn install --frozen-lockfile
        yarn build
